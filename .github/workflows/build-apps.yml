name: Build fnOS App Packages

permissions:
  contents: write
  actions: write

on:
  push:
    paths:
      - 'apps/**'
      - 'shared/**'
      - '!**/*.md'
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:
    inputs:
      app:
        description: 'App slug to build (e.g. syncthing, plex)'
        required: true
        type: string
      version:
        description: 'Version (leave empty for latest)'
        required: false
        default: ''
      revision:
        description: 'Revision suffix (e.g., r2 for re-release, leave empty for auto)'
        required: false
        default: ''

jobs:
  detect:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.detect.outputs.matrix }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect apps to build
        id: detect
        run: |
          EVENT="${{ github.event_name }}"

          all_apps() {
            ls -d apps/*/ 2>/dev/null | xargs -n1 basename | jq -R -s -c 'split("\n") | map(select(. != ""))'
          }

          if [ "$EVENT" = "workflow_dispatch" ]; then
            APP="${{ inputs.app }}"
            if [ ! -d "apps/$APP" ]; then
              echo "::error::App '$APP' not found in apps/ directory"
              exit 1
            fi
            MATRIX="[\"$APP\"]"

          elif [ "$EVENT" = "schedule" ]; then
            MATRIX=$(all_apps)

          else
            # push: detect changed apps
            BEFORE="${{ github.event.before }}"
            if [ "$BEFORE" = "0000000000000000000000000000000000000000" ]; then
              MATRIX=$(all_apps)
            else
              CHANGED=$(git diff --name-only "$BEFORE" "${{ github.sha }}" 2>/dev/null || true)
              if echo "$CHANGED" | grep -q '^shared/'; then
                # shared framework changed — rebuild all apps
                MATRIX=$(all_apps)
              else
                APPS=$(echo "$CHANGED" | grep '^apps/' | cut -d/ -f2 | sort -u | grep -v '^$' || true)
                if [ -z "$APPS" ]; then
                  MATRIX="[]"
                else
                  MATRIX=$(echo "$APPS" | jq -R -s -c 'split("\n") | map(select(. != ""))')
                fi
              fi
            fi
          fi

          echo "matrix=$MATRIX" >> "$GITHUB_OUTPUT"
          echo "Apps to build: $MATRIX"

  build:
    needs: detect
    if: needs.detect.outputs.matrix != '[]'
    strategy:
      fail-fast: false
      matrix:
        app: ${{ fromJson(needs.detect.outputs.matrix) }}
    uses: ./.github/workflows/reusable-build-app.yml
    with:
      app: ${{ matrix.app }}
      version: ${{ github.event.inputs.version || '' }}
      revision: ${{ github.event.inputs.revision || '' }}
      event_name: ${{ github.event_name }}
    secrets: inherit

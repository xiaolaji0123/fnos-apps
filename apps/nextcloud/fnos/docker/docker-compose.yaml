services:
  nextcloud:
    image: ${DOCKER_MIRROR}docker.io/nextcloud:${VERSION}-apache
    container_name: nextcloud
    ports:
      - "${TRIM_SERVICE_PORT}:80"
    volumes:
      - ${TRIM_PKGVAR}/html:/var/www/html
      - ${UPLOAD_LOCATION:-${TRIM_PKGVAR}/data}:/var/www/html/data
    environment:
      - TZ=Asia/Shanghai
      - MYSQL_HOST=nextcloud-db
      - MYSQL_DATABASE=nextcloud
      - MYSQL_USER=nextcloud
      - MYSQL_PASSWORD=${DB_PASSWORD:-nextcloud}
      - REDIS_HOST=nextcloud-redis
      - NEXTCLOUD_TRUSTED_DOMAINS=*
    depends_on:
      - nextcloud-db
      - nextcloud-redis
    restart: unless-stopped

  nextcloud-db:
    image: ${DOCKER_MIRROR}docker.io/mariadb:11
    container_name: nextcloud-db
    environment:
      - TZ=Asia/Shanghai
      - MYSQL_ROOT_PASSWORD=${DB_PASSWORD:-nextcloud}
      - MYSQL_DATABASE=nextcloud
      - MYSQL_USER=nextcloud
      - MYSQL_PASSWORD=${DB_PASSWORD:-nextcloud}
    volumes:
      - ${TRIM_PKGVAR}/mysql:/var/lib/mysql
    restart: unless-stopped

  nextcloud-redis:
    image: ${DOCKER_MIRROR}docker.io/valkey/valkey:8-bookworm
    container_name: nextcloud-redis
    restart: unless-stopped
